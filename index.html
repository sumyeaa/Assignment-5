<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- daisy ui  -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
</head>
<body>
    <section id="logIn_card" class="mx-auto flex flex-col items-center items-center justify-center min-h-screen ">
        <div class="bg-base-200 border-base-300 rounded-box w-xs border p-[20px]">
            <div class="flex flex-col items-center space-y-1">
            <img src="./assets/github-logo.png" alt="">
            <h2 class="text-xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-sm">Sign in to manage your issues</p>
        </div>
        <div class="space-y-3">
            <fieldset class="fieldset ">

            <label class="label font-semibold text-sm">Username</label>
            <input type="text" class="input" placeholder="Enter Username" />
            <p class="text-violet-700 text-xs font-thin">Default : admin</p>
            <label class="label font-semibold text-sm">Password</label>
            <input type="password" class="input" placeholder="Password" />
            <p class="text-violet-700 text-xs font-thin">Default : 1234</p>
            <button class="btn btn-primary mt-4">Sign In</button>
</fieldset>
        </div>
        <div class="flex items-center gap-1 mb-2">
            <hr class="flex-1 border-gray-300">
            <p>OR</p>
            <hr class="flex-1 border-gray-300">
        </div>
        <div class="mx-auto items-center flex flex-col space-y-2">
            <div class="">
                <p class="text-xs font-thin">Demo Credentials:</p>
            </div>
            <div>
                <p><span class="font-semibold text-sm">Username </span>
                <span class="text-sm">: admin</span></p>
                <p><span class="font-semibold text-sm">Password </span>
                <span class="text-sm">: 1234</span></p>
            </div>
        </div>
        </div>
    </section>
</body>
</html>
