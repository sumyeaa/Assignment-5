<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>git issue tracker</title>
    <!-- font awesome  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- daisy ui  -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<!-- css style  -->
 <style>
    .activecolour{
        background-color: rgb(51, 29, 166);
        color:antiquewhite;
    }
 </style>
    
</head>
<body>
    <!-- login section  -->
    <section id="login_part" class="mx-auto flex flex-col items-center justify-center min-h-screen">
        <!-- login cards  -->
        <div class="bg-base-200 border-base-300 rounded-box w-xs border p-[20px]">
            <!-- login 1st card  -->
            <div class="flex flex-col items-center space-y-1">
            <img src="./assets/github-logo.png" alt="">
            <h2 class="text-xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-sm">Sign in to manage your issues</p>
        </div>
        <!-- login 2nd card  -->
        <div class="space-y-3">
            <fieldset class="fieldset ">

            <label class="label font-semibold text-sm">Username</label>
            <input id="username" type="text" class="input" placeholder="Enter Username" />
            <p class="text-violet-700 text-xs font-thin">Default : admin</p>
            <label class="label font-semibold text-sm">Password</label>
            <input id="pass" type="password" class="input" placeholder="Password" />
            <p class="text-violet-700 text-xs font-thin">Default : admin123</p>
            <button onclick="mainpage()" id="signin_btn" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
        </div>
        <!-- login 3rd card  -->
        <div class="flex items-center gap-1 mb-2">
            <hr class="flex-1 border-gray-300">
            <p>OR</p>
            <hr class="flex-1 border-gray-300">
        </div>
        <!-- login 4th card  -->
        <div class="mx-auto items-center flex flex-col space-y-2">
            <div class="">
                <p class="text-xs font-thin">Demo Credentials:</p>
            </div>
            <div>
                <p><span class="font-semibold text-sm">Username </span>
                <span class="text-sm">: admin</span></p>
                <p><span class="font-semibold text-sm">Password </span>
                <span class="text-sm">: admin123</span></p>
            </div>
        </div>
        </div>
    </section>

    <section id="main_part" class="hidden">
        
    <!-- main page section -->
     <section >
        <!-- navbar  -->
        <div class="navbar bg-base-300 shadow-sm">
           
        <div class="w-full flex flex-col md:flex-row md:justify-between md:items-center lg:flex-row lg:justify-between items-center gap-2">
             <!-- nav logo and name  -->
              <div class="">
    <a class="btn btn-ghost">
        <img src="./assets/github-logo.png" alt="" class="h-7">
        <h2 class="flex-nowrap font-medium text-2xl font-semibold">GitHub Issues Tracker</h2>
    </a>
  </div>
  <!-- search and new issue  -->
  <div class="flex gap-2">
    <div class="relative w-40">
        <i class="fa-solid fa-magnifying-glass absolute left-3  top-1/2 -translate-y-1/2 text-gray-500 z-10"></i>
         <input id="search" type="text" placeholder="Search issues..." class="input input-bordered pl-10 w-full" />
    </div>
      <button id="newissue" class="btn btn-primary "><i class="fa-solid fa-plus"></i> New issue</button>
    </div>
        </div>
  </div>
     </section>

     <!-- all open close part  -->
     <section>
        <div id="menuBar">
            <!-- button div  -->
           <div class="flex gap-3 my-4 p-7 bg-gray-100">
             <button id="all" onclick="showAll()" class="btn btn-outline btn-primary text-xs w-[60px] p-5">All</button>
            <button id="open" onclick="showOpen()" class="btn btn-outline btn-primary text-xs w-[60px] p-5">Open</button>
            <button id="closed" onclick="showClosed()" class="btn btn-outline btn-primary text-xs w-[60px] p-5">Closed</button>
           </div>
           
        </div>
        <!-- spinner  -->
           <div id="spinner" class=" flex items-center justify-center py-10 hidden">
            <span class="loading loading-dots loading-md "></span>
           </div>
        <div id="allDiv" class="grid grid-cols-1 md:grid-cols-4 lg:grid-cols-6 gap-4 mx-auto"></div>
     </section>

<!-- modal part -->
    <dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
  <div class="modal-box">
    <div id="details_container" class="space-y-4">
       
    </div>
    <div class="modal-action">
      <form method="dialog">
        <button class="btn btn-primary">Close</button>
      </form>
    </div>
  </div>
</dialog>
    </section>





     <!-- js added  -->
      <script src="./script/script.js"></script>
</body>
</html>
